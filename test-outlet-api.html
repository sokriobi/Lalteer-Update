<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Outlet API Test</title>\n  <style>\n    body { font-family: Arial, sans-serif; padding: 20px; }\n    .container { max-width: 1000px; margin: 0 auto; }\n    textarea { width: 100%; height: 400px; margin: 10px 0; font-family: monospace; }\n    button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; }\n    .error { color: red; }\n    .success { color: green; }\n    .info { color: blue; }\n    pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }\n  </style>\n</head>\n<body>\n  <div class=\"container\">\n    <h1>Outlet Report API Test</h1>\n    \n    <div>\n      <h2>Test Setup</h2>\n      <p>\n        <label>Token (from localStorage):</label><br>\n        <input type=\"text\" id=\"token\" style=\"width: 100%; padding: 5px;\" />\n        <button onclick=\"getToken()\">Load Token from Browser</button>\n      </p>\n      \n      <p>\n        <label>Date From:</label><br>\n        <input type=\"date\" id=\"fromDate\" />\n        <button onclick=\"setToday()\">Set to Today</button>\n      </p>\n      \n      <p>\n        <label>Date To:</label><br>\n        <input type=\"date\" id=\"toDate\" />\n        <button onclick=\"setToday()\">Set to Today</button>\n      </p>\n      \n      <button onclick=\"testProxyRoute()\" style=\"background: blue; color: white;\">Test Outlet API</button>\n      <button onclick=\"clearOutput()\" style=\"background: gray; color: white;\">Clear Output</button>\n    </div>\n    \n    <div>\n      <h2>Output</h2>\n      <textarea id=\"output\" readonly></textarea>\n    </div>\n  </div>\n  \n  <script>\n    function log(msg, type = 'info') {\n      const output = document.getElementById('output');\n      const timestamp = new Date().toLocaleTimeString();\n      const prefix = type.toUpperCase() + ' [' + timestamp + ']: ';\n      output.value += prefix + msg + '\\n';\n      output.scrollTop = output.scrollHeight;\n    }\n    \n    function getToken() {\n      const token = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');\n      if (token) {\n        document.getElementById('token').value = token;\n        log('Token loaded from storage', 'success');\n      } else {\n        log('No token found. Please log in first.', 'error');\n      }\n    }\n    \n    function setToday() {\n      const today = new Date().toISOString().split('T')[0];\n      document.getElementById('fromDate').value = today;\n      document.getElementById('toDate').value = today;\n      log('Dates set to today: ' + today, 'success');\n    }\n    \n    function clearOutput() {\n      document.getElementById('output').value = '';\n    }\n    \n    async function testProxyRoute() {\n      const token = document.getElementById('token').value;\n      const fromDate = document.getElementById('fromDate').value;\n      const toDate = document.getElementById('toDate').value;\n      \n      if (!token) {\n        log('ERROR: No token provided', 'error');\n        return;\n      }\n      if (!fromDate || !toDate) {\n        log('ERROR: Please select dates', 'error');\n        return;\n      }\n      \n      log('Starting test...', 'info');\n      log('Token: ' + token.substring(0, 20) + '...', 'info');\n      log('Date range: ' + fromDate + ' to ' + toDate, 'info');\n      \n      const url = `http://localhost:8080/api/local/outlet-report-json?range=${fromDate},${toDate}&ut=1`;\n      log('Request URL: ' + url, 'info');\n      \n      try {\n        log('Sending request...', 'info');\n        const response = await fetch(url, {\n          method: 'GET',\n          headers: {\n            'Accept': 'application/json',\n            'Authorization': 'Bearer ' + token\n          }\n        });\n        \n        log('Response status: ' + response.status, response.ok ? 'success' : 'error');\n        \n        const data = await response.json();\n        log('Response received', 'success');\n        \n        if (response.ok) {\n          log('SUCCESS! Data structure:', 'success');\n          log('Total rows: ' + data.total, 'success');\n          \n          if (data.data && data.data.length > 0) {\n            log('First row keys: ' + Object.keys(data.data[0]).join(', '), 'success');\n            log('First row sample: ' + JSON.stringify(data.data[0], null, 2), 'success');\n            \n            // Check for supplier field\n            const row = data.data[0];\n            const possibleFields = Object.keys(row).filter(k => \n              k.toLowerCase().includes('supplier') || \n              k.toLowerCase().includes('vendor') ||\n              k.toLowerCase().includes('code')\n            );\n            \n            if (possibleFields.length > 0) {\n              log('Possible supplier fields found: ' + possibleFields.join(', '), 'success');\n            } else {\n              log('WARNING: No obvious supplier field found', 'error');\n              log('Available fields: ' + Object.keys(row).join(', '), 'error');\n            }\n          } else {\n            log('WARNING: No data rows returned', 'error');\n          }\n          \n          // Show full response\n          log('Full response: ' + JSON.stringify(data, null, 2), 'info');\n        } else {\n          log('Error: ' + (data.message || 'Unknown error'), 'error');\n          log('Full response: ' + JSON.stringify(data, null, 2), 'error');\n        }\n      } catch (err) {\n        log('FETCH ERROR: ' + err.message, 'error');\n        log('Make sure: 1) Proxy is running on port 8080', 'error');\n        log('Make sure: 2) Token is valid', 'error');\n        log('Make sure: 3) Date range has data', 'error');\n      }\n    }\n    \n    // Auto-run on load\n    window.addEventListener('load', () => {\n      log('Test page loaded', 'success');\n      getToken();\n      setToday();\n    });\n  </script>\n</body>\n</html>"
